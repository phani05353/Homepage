server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's internal DNS resolver.
    # ipv6=off forces A-record (IPv4) lookups only — prevents "Network unreachable"
    # on Docker hosts that have no IPv6 routing.
    # Using a variable in proxy_pass (below) forces Nginx to use this resolver
    # at request time rather than resolving the hostname once at startup.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ── CORS proxy — browser calls /proxy/facts/<path> ───────────────────────
    location ~ ^/proxy/facts/(.*)$ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Max-Age 3600;
            return 204;
        }

        set $facts_host "uselessfacts.jsph.pl";
        set $facts_path $1;

        proxy_pass         https://$facts_host/api/facts/$facts_path$is_args$args;
        proxy_ssl_server_name on;
        proxy_set_header   Host $facts_host;
        proxy_set_header   Accept "application/json";

        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
    }

    # ── SPA routing ───────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
