server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── CORS proxy — browser calls /proxy/facts/... ──────────────────────────
    # Nginx forwards the request server-side (no CORS restriction), then injects
    # the Access-Control-Allow-Origin header before returning it to the browser.
    location /proxy/facts/ {
        # Handle preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Max-Age 3600;
            return 204;
        }

        proxy_pass         https://uselessfacts.jsph.pl/api/facts/;
        proxy_ssl_server_name on;
        proxy_set_header   Host uselessfacts.jsph.pl;
        proxy_set_header   Accept "application/json";

        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
    }

    # ── SPA routing ───────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
