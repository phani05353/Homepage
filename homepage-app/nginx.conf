server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Health check ─────────────────────────────────────────────────────────
    # Used by the Dockerfile HEALTHCHECK and by Portainer for container status.
    # Returns 200 OK with a minimal body, no logging to keep access.log clean.
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ── SPA routing ───────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
