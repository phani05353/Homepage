server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Health check ─────────────────────────────────────────────────────────
    # Probed by the Dockerfile HEALTHCHECK and surfaced in Portainer.
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ── SPA routing ───────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
